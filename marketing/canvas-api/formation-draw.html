<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>futbolClub · formation-draw 30s 16:9</title>
<style>
  :root { --pitch:#0e7a3e; --lime:#c6ff3d; --ink:#0c1410; --paper:#f4f3ec; --red:#ff3d4e; --cyan:#33d6e6; }
  html,body{margin:0;background:var(--ink);color:var(--paper);font-family:"Space Grotesk",system-ui,sans-serif;}
  .wrap{display:grid;place-items:center;min-height:100vh;gap:14px;padding:24px;}
  canvas{background:#000;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,.4); max-width:100%; height:auto;}
  .ctrls{display:flex;gap:10px;}
  button{font:inherit;padding:10px 20px;border-radius:999px;border:0;background:var(--lime);color:var(--ink);font-weight:700;cursor:pointer;}
  button.stop{background:var(--red);color:var(--paper);}
  small{opacity:.6;font-family:ui-monospace,monospace;}
</style>
</head>
<body>
<div class="wrap">
  <canvas id="cv" width="1920" height="1080"></canvas>
  <div class="ctrls">
    <button id="rec">⏺ Grabar 30s</button>
    <button id="stop" class="stop" disabled>⏹ Stop</button>
  </div>
  <small>Tutorial táctico · 30s · 16:9 · 30fps · MediaRecorder → .webm</small>
</div>

<script>
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W=cv.width, H=cv.height, FPS=30, DUR=30000;
const C={pitch:'#0e7a3e',pitchDark:'#0a5a2e',lime:'#c6ff3d',ink:'#0c1410',paper:'#f4f3ec',red:'#ff3d4e',cyan:'#33d6e6'};

const FORMATIONS = {
  '4-4-2':   [[960,950],[400,820],[760,820],[1160,820],[1520,820],[400,580],[760,580],[1160,580],[1520,580],[760,340],[1160,340]],
  '4-3-3':   [[960,950],[400,820],[760,820],[1160,820],[1520,820],[600,620],[960,620],[1320,620],[480,340],[960,290],[1440,340]],
  '3-5-2':   [[960,950],[600,820],[960,820],[1320,820],[360,580],[680,580],[960,580],[1240,580],[1560,580],[760,320],[1160,320]],
};
const ORDER = ['4-4-2','4-3-3','3-5-2'];

function ease(t){return t<.5? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;}
function lerp(a,b,t){return a+(b-a)*t;}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawPitch(){
  ctx.fillStyle = C.pitch; ctx.fillRect(0,0,W,H);
  // dark stripes
  for(let i=0;i<10;i++){ ctx.fillStyle = i%2? '#0d6e38':'#0e7a3e'; ctx.fillRect(0,i*(H/10),W,H/10);}
  ctx.strokeStyle = C.paper; ctx.lineWidth = 4; ctx.globalAlpha=.9;
  ctx.strokeRect(60,60,W-120,H-120);
  ctx.beginPath(); ctx.moveTo(W/2,60); ctx.lineTo(W/2,H-60); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2,H/2,110,0,Math.PI*2); ctx.stroke();
  // areas
  ctx.strokeRect(60,H/2-200,180,400);
  ctx.strokeRect(W-240,H/2-200,180,400);
  ctx.globalAlpha=1;
}

function drawPlayer(x,y,num,color=C.lime){
  ctx.beginPath(); ctx.arc(x,y,38,0,Math.PI*2);
  ctx.fillStyle=color; ctx.fill();
  ctx.lineWidth=4; ctx.strokeStyle=C.ink; ctx.stroke();
  ctx.fillStyle=C.ink; ctx.font='bold 30px "Space Grotesk",system-ui'; ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(num,x,y+2);
}

function drawHUD(title, sub){
  // top bar
  ctx.fillStyle = 'rgba(12,20,16,0.8)';
  roundRect(40,40,640,120,20); ctx.fill();
  ctx.fillStyle=C.lime; ctx.font='bold 56px "Space Grotesk",system-ui'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(title, 80, 90);
  ctx.fillStyle=C.paper; ctx.font='28px "Space Grotesk",system-ui';
  ctx.fillText(sub, 80, 135);

  // brand bottom-right
  ctx.fillStyle = 'rgba(12,20,16,0.8)';
  roundRect(W-420,H-110,380,70,35); ctx.fill();
  ctx.fillStyle=C.lime; ctx.font='bold 32px "Space Grotesk",system-ui'; ctx.textAlign='center';
  ctx.fillText('futbolClub · armá la 11', W-230, H-65);
}

function drawProgress(t){
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0,0,W,6);
  ctx.fillStyle = C.lime;
  ctx.fillRect(0,0,W*t,6);
}

// 30s storyboard:
// 0–4s   intro + 4-4-2 entra
// 4–10s  hold 4-4-2 con labels
// 10–18s morph a 4-3-3
// 18–26s morph a 3-5-2
// 26–30s CTA final

function frame(t){
  drawPitch();
  const tt = t/DUR;

  let from, to, k=0;
  if(t<4000){ from=to=FORMATIONS['4-4-2']; k = ease(t/4000); }       // intro
  else if(t<10000){ from=to=FORMATIONS['4-4-2']; k=1; }
  else if(t<18000){ from=FORMATIONS['4-4-2']; to=FORMATIONS['4-3-3']; k=ease((t-10000)/8000); }
  else if(t<26000){ from=FORMATIONS['4-3-3']; to=FORMATIONS['3-5-2']; k=ease((t-18000)/8000); }
  else { from=to=FORMATIONS['3-5-2']; k=1; }

  for(let i=0;i<from.length;i++){
    const [x1,y1]=from[i], [x2,y2]=to[i];
    let x=lerp(x1,x2,k), y=lerp(y1,y2,k);
    let scale = 1;
    if(t<4000) scale = ease(Math.min(1, (t - i*200)/600));   // pop-in
    if(scale<=0) continue;
    ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
    drawPlayer(0,0,i+1);
    ctx.restore();
  }

  // HUD title
  let title='', sub='';
  if(t<4000){ title='futbolClub'; sub='editor de alineaciones · client-side'; }
  else if(t<10000){ title='4-4-2'; sub='clásico equilibrado'; }
  else if(t<18000){ title='4-4-2 → 4-3-3'; sub='ataque por bandas'; }
  else if(t<26000){ title='4-3-3 → 3-5-2'; sub='densidad en el medio'; }
  else { title='Armá la tuya'; sub='futbolClub.html'; }
  drawHUD(title, sub);

  // bottom CTA on final
  if(t>=26000){
    const kf = ease((t-26000)/4000);
    ctx.globalAlpha = kf;
    ctx.fillStyle = C.lime;
    roundRect(W/2-400, H/2-90, 800, 180, 50); ctx.fill();
    ctx.fillStyle = C.ink;
    ctx.font='bold 76px "Space Grotesk",system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Armá tu equipo →', W/2, H/2);
    ctx.globalAlpha = 1;
  }

  drawProgress(tt);
}

let start=performance.now(); let running=true;
function tick(now){
  let t = now-start;
  if(t>DUR) t = DUR;
  frame(t);
  if(running) requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

const rec=document.getElementById('rec'), stop=document.getElementById('stop');
let mr, chunks;
rec.addEventListener('click', () => {
  start = performance.now();
  const stream = cv.captureStream(FPS);
  chunks=[];
  mr = new MediaRecorder(stream, {mimeType:'video/webm;codecs=vp9', videoBitsPerSecond: 12_000_000});
  mr.ondataavailable = e => e.data.size && chunks.push(e.data);
  mr.onstop = () => {
    const blob=new Blob(chunks,{type:'video/webm'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='formation-draw.webm'; a.click();
  };
  mr.start();
  rec.disabled=true; stop.disabled=false;
  setTimeout(()=>{ if(mr.state==='recording'){ mr.stop(); rec.disabled=false; stop.disabled=true; } }, DUR+100);
});
stop.addEventListener('click', ()=>{ mr?.stop(); rec.disabled=false; stop.disabled=true; });
</script>
</body>
</html>
